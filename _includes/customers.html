<!-- customers.html -->
<div class="customers">
  <h4 class="customers-title">Trusted by</h4>
  <div class="customers-logos">
    {% for customer in site.data.customers %}
    {%- assign logo_path = customer.logo | prepend: 'assets/img/' | relative_url -%}
    {% if customer.url %}<a href="{{ customer.url }}" target="_blank" rel="noopener noreferrer" title="{{ customer.name }}">{% endif %}
      <img src="{{ logo_path }}" alt="{{ customer.name }}" class="customer-logo" />
    {% if customer.url %}</a>{% endif %}
    {% endfor %}
  </div>
</div>
